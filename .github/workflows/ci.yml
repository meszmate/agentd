name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-flight runs on the same ref so a new push supersedes the old one.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck (all workspaces)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun --filter '*' typecheck

  build-web:
    name: Build web bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build @agentd/web
        run: bun --filter @agentd/web build

      - name: Upload web bundle
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          if-no-files-found: error
          retention-days: 7

  smoke-daemon:
    name: Smoke test daemon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # We don't have the agent CLIs (claude, codex) on CI, so we can't actually
      # run a task end-to-end. We can verify the daemon boots, serves /health,
      # mints a pairing token, and exchanges it for a session.
      # AGENTD_NO_AUTOBUILD=1 skips the on-boot Vite build of the web bundle —
      # the smoke test only hits HTTP endpoints, so the UI is unused, and the
      # build otherwise blocks Bun.serve from binding for ~20-30s.
      - name: Boot daemon and exercise pair → health → tasks
        env:
          AGENTD_NO_AUTOBUILD: "1"
        run: |
          bun apps/daemon/src/index.ts --root "$RUNNER_TEMP/agentd-ci" > "$RUNNER_TEMP/daemon.log" 2>&1 &
          DPID=$!
          # wait up to 30s for the daemon to be ready
          for i in {1..60}; do
            if curl -sf http://127.0.0.1:3773/health > /dev/null; then break; fi
            sleep 0.5
          done
          if ! curl -sf http://127.0.0.1:3773/health; then
            echo "daemon never became healthy — dumping log:"
            cat "$RUNNER_TEMP/daemon.log"
            kill "$DPID" || true
            exit 1
          fi
          TOKEN=$(grep -oE 'token:  [A-Za-z0-9_-]+' "$RUNNER_TEMP/daemon.log" | awk '{print $2}' | head -1)
          if [ -z "$TOKEN" ]; then
            echo "no pairing token printed"
            cat "$RUNNER_TEMP/daemon.log"
            kill "$DPID" || true
            exit 1
          fi
          SESSION=$(curl -sf -X POST http://127.0.0.1:3773/pair \
            -H "content-type: application/json" \
            -d "{\"pairingToken\":\"$TOKEN\",\"deviceLabel\":\"ci\"}" \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["sessionToken"])')
          curl -sf http://127.0.0.1:3773/api/tasks -H "x-agentd-session: $SESSION"
          kill "$DPID" || true
