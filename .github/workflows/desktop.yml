name: Desktop release

# Builds the @agentd/desktop installers for macOS / Windows / Linux when a
# `v*` tag is pushed, plus on manual dispatch. The web bundle is built once
# on Linux and reused across platforms via an artifact, since the React app
# is platform-independent.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-web:
    name: Build web bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build @agentd/web
        run: bun --filter @agentd/web build

      - name: Upload web bundle
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          if-no-files-found: error
          retention-days: 7

  build-desktop:
    name: Build desktop (${{ matrix.os }})
    needs: build-web
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: macos-latest
            target: mac
          - os: windows-latest
            target: win
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download web bundle
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

      - name: Build installer
        run: bun --filter @agentd/desktop build:${{ matrix.target }}
        env:
          # electron-builder skips signing when these aren't set; releases
          # produced by this workflow are unsigned by design. Add signing
          # secrets here when there's a developer cert to sign with.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: agentd-desktop-${{ matrix.target }}
          path: |
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.zip
            apps/desktop/dist/*.exe
            apps/desktop/dist/*.AppImage
            apps/desktop/dist/*.deb
          if-no-files-found: warn
          retention-days: 14
