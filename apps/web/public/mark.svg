<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="agentd">
  <title>agentd</title>
  <!--
    Geometric "a" — bowl (rounded square on the left) + stem
    (rounded vertical bar on the right). Reads as the brand initial
    at icon sizes without literal letterforms; ember keeps it on
    palette. One shape, one color.
  -->
  <rect x="4" y="14" width="17" height="14" rx="3.5" fill="#DC2626" />
  <rect x="21" y="6" width="6" height="22" rx="3" fill="#DC2626" />
</svg>
